# Monthly Teleport sync → commit data/cities.json → optional Vercel redeploy.
# GitHub: add secret VERCEL_DEPLOY_HOOK = full URL from Vercel → Settings → Git → Deploy Hooks.
name: Sync cities data (Teleport)

on:
  schedule:
    - cron: '0 6 1 * *' # 1st of month, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Teleport sync
        run: node scripts/sync-cities.js

      - name: Commit cities.json if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cities.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to cities.json"
          else
            MSG="chore: update cities data $(date -u +%b-%Y | tr '[:upper:]' '[:lower:]')"
            git commit -m "$MSG"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Vercel deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set — skip deploy trigger"
            exit 0
          fi
          curl -fsS -X POST "$HOOK" || echo "Deploy hook request failed (non-blocking)"
